<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LastKismit 的博客 | 技术分享</title>
    <!-- 引用 CSS 文件，注意路径：如果在根目录直接写 style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">LastKismit</a>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/archive.html">归档</a></li>
                <li><a href="/about.html">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 英雄区 -->
    <header class="hero">
        <h1>LastKismit 的技术手记</h1>
        <p>记录编程路上的点点滴滴</p>
    </header>

    <!-- 搜索区 -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 搜索文章..." autocomplete="off">
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- 文章列表区（通过 HTML 手动维护） -->
    <main class="container">
        <article class="post-card">
            <h2><a href="/posts/first-post.html">Hello GitHub Pages!</a></h2>
            <div class="post-meta">2026-04-16 | 3分钟阅读</div>
            <p>这是我的第一篇博客，记录如何使用 GitHub Pages 搭建个人博客……</p>
        </article>
        <!-- 可以继续添加更多 article 卡片 -->
    </main>

    <footer>
        <p>© 2026 LastKismit | 基于 GitHub Pages 搭建</p>
    </footer>

    <!-- 搜索脚本：从 search.json 读取索引并实时过滤 -->
    <script>
        // 全局存储所有文章数据
        let postsData = [];

        // 加载 search.json 索引文件
        fetch('search.json')
            .then(response => response.json())
            .then(data => {
                postsData = data;
            })
            .catch(err => console.error('加载搜索索引失败', err));

        // 监听搜索框输入
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('searchResults');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            if (query === '') {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                return;
            }

            // 在标题和摘要中匹配关键词
            const matched = postsData.filter(post => 
                post.title.toLowerCase().includes(query) || 
                post.summary.toLowerCase().includes(query)
            );

            if (matched.length === 0) {
                resultsDiv.innerHTML = '<div class="no-result">没有找到相关文章</div>';
            } else {
                let html = '<ul class="search-list">';
                matched.forEach(post => {
                    html += `<li><a href="${post.url}">${post.title}</a><span class="search-summary">${post.summary.substring(0, 80)}...</span></li>`;
                });
                html += '</ul>';
                resultsDiv.innerHTML = html;
            }
            resultsDiv.style.display = 'block';
        });
    </script>
</body>
</html>
