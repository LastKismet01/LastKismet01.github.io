<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LastKismit的OJ</title>
    <!-- 引入Bootstrap样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入Chart.js做图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        body { background-color: #f5f7fa; }
        .card { margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .navbar { background-color: #2d3748; }
        .navbar-brand, .nav-link { color: white; }
        .nav-link:hover { color: #ffc107; }
        .login-btn, .register-btn { margin-left: 10px; }
        .chart-card { height: 300px; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">LastKismit OJ</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">题库</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">比赛</a></li>
                </ul>
                <!-- 用户信息/登录注册按钮 -->
                <div id="user-info" class="d-flex align-items-center">
                    <button class="btn btn-light login-btn" onclick="showLoginModal()">登录</button>
                    <button class="btn btn-warning register-btn" onclick="showRegisterModal()">注册</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 登录弹窗 -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">用户登录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="login-username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="login-username" placeholder="输入用户名">
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="login-password" placeholder="输入密码">
                    </div>
                    <div id="login-msg" class="text-danger"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="login()">登录</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">用户注册</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="reg-username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="reg-username" placeholder="设置用户名">
                    </div>
                    <div class="mb-3">
                        <label for="reg-password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="reg-password" placeholder="设置密码">
                    </div>
                    <div id="reg-msg" class="text-danger"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-warning" onclick="register()">注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <div class="row">
            <!-- 左侧：问题跳转 -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>问题跳转</h5>
                    <input type="text" id="pid-input" class="form-control mb-2" placeholder="例：P1001">
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger w-50" onclick="gotoProblem()">跳转</button>
                        <button class="btn btn-primary w-50" onclick="randomProblem()">随机跳题</button>
                    </div>
                    <div id="jump-result" class="mt-2"></div>
                </div>
            </div>

            <!-- 右侧：打卡&运势 -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>今日运势</h5>
                    <p>已连续打卡 <span id="streak">0</span> 天</p>
                    <button class="btn btn-warning w-100" onclick="checkin()">点击打卡</button>
                    <div id="checkin-result" class="mt-2"></div>
                </div>
            </div>
        </div>

        <!-- 做题数据统计图表 -->
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="card p-3 chart-card">
                    <h5>近7天做题统计</h5>
                    <canvas id="submissionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入Bootstrap JS和jQuery（用于弹窗） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 后端接口地址（本地测试用，部署后替换成Render/Vercel的地址）
        const API_BASE = "http://127.0.0.1:5000/api";
        // 全局变量：登录状态、用户信息
        let isLogin = false;
        let username = "";
        // 图表实例
        let submissionChart = null;

        // 页面加载完成后初始化
        window.onload = function() {
            // 初始化图表
            initChart();
            // 检查登录状态
            checkLoginStatus();
        };

        // 初始化做题统计图表
        function initChart() {
            const ctx = document.getElementById('submissionChart').getContext('2d');
            submissionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['7天前', '6天前', '5天前', '4天前', '3天前', '2天前', '昨天'],
                    datasets: [{
                        label: '做题数量',
                        data: [0, 0, 0, 0, 0, 0, 0],
                        backgroundColor: 'rgba(54, 162, 235, 0.2)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 2,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        // 检查登录状态
        function checkLoginStatus() {
            fetch(`${API_BASE}/home`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        // 已登录：更新用户信息
                        isLogin = true;
                        username = data.username;
                        document.getElementById('user-info').innerHTML = `
                            <span class="text-white me-3">欢迎，${username}</span>
                            <button class="btn btn-outline-light" onclick="logout()">退出</button>
                        `;
                        // 更新打卡天数
                        document.getElementById('streak').innerText = data.checkin_streak || 0;
                        // 模拟加载做题数据（实际项目从后端获取）
                        loadSubmissionData();
                    } else {
                        // 未登录：显示登录/注册按钮
                        isLogin = false;
                        document.getElementById('user-info').innerHTML = `
                            <button class="btn btn-light login-btn" onclick="showLoginModal()">登录</button>
                            <button class="btn btn-warning register-btn" onclick="showRegisterModal()">注册</button>
                        `;
                    }
                })
                .catch(err => console.log("检查登录状态失败：", err));
        }

        // 显示登录弹窗
        function showLoginModal() {
            const modal = new bootstrap.Modal(document.getElementById('loginModal'));
            modal.show();
        }

        // 显示注册弹窗
        function showRegisterModal() {
            const modal = new bootstrap.Modal(document.getElementById('registerModal'));
            modal.show();
        }

        // 登录逻辑
        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const msgDom = document.getElementById('login-msg');

            if (!username || !password) {
                msgDom.innerText = "用户名和密码不能为空！";
                return;
            }

            // 发送登录请求
            fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${username}&password=${password}`
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    msgDom.innerText = "";
                    // 关闭弹窗
                    bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                    // 刷新登录状态
                    checkLoginStatus();
                    alert("登录成功！");
                } else {
                    msgDom.innerText = "用户名或密码错误！";
                }
            })
            .catch(err => {
                msgDom.innerText = "登录失败，请重试！";
                console.log("登录请求失败：", err);
            });
        }

        // 注册逻辑
        function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const msgDom = document.getElementById('reg-msg');

            if (!username || !password) {
                msgDom.innerText = "用户名和密码不能为空！";
                return;
            }

            // 发送注册请求
            fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${username}&password=${password}`
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    msgDom.innerText = "";
                    // 关闭弹窗
                    bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                    alert("注册成功，请登录！");
                } else if (data.status === "exists") {
                    msgDom.innerText = "用户名已存在！";
                } else {
                    msgDom.innerText = "注册失败，请重试！";
                }
            })
            .catch(err => {
                msgDom.innerText = "注册请求失败，请重试！";
                console.log("注册请求失败：", err);
            });
        }

        // 退出登录
        function logout() {
            // 清空session（实际后端需处理，这里前端模拟）
            isLogin = false;
            username = "";
            checkLoginStatus();
            alert("退出成功！");
        }

        // 打卡功能
        function checkin() {
            if (!isLogin) {
                alert("请先登录！");
                showLoginModal();
                return;
            }

            fetch(`${API_BASE}/checkin`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('checkin-result').innerText = data.msg;
                document.getElementById('streak').innerText = data.streak || 0;
            })
            .catch(err => {
                document.getElementById('checkin-result').innerText = "打卡失败，请重试！";
                console.log("打卡请求失败：", err);
            });
        }

        // 问题跳转
        function gotoProblem() {
            const pid = document.getElementById('pid-input').value.trim();
            const resultDom = document.getElementById('jump-result');

            if (!pid) {
                resultDom.innerText = "请输入题目编号！";
                resultDom.className = "text-danger mt-2";
                return;
            }

            fetch(`${API_BASE}/goto_problem`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `pid=${pid}`
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    resultDom.innerText = `找到题目：${data.name}，即将跳转...`;
                    resultDom.className = "text-success mt-2";
                    // 模拟跳转（实际项目替换成真实题目页面）
                    setTimeout(() => {
                        alert(`跳转到题目 ${pid}：${data.name}`);
                    }, 1000);
                } else {
                    resultDom.innerText = "未找到该题目！";
                    resultDom.className = "text-danger mt-2";
                }
            })
            .catch(err => {
                resultDom.innerText = "请求失败，请重试！";
                resultDom.className = "text-danger mt-2";
                console.log("跳题请求失败：", err);
            });
        }

        // 随机跳题
        function randomProblem() {
            fetch(`${API_BASE}/random_problem`)
                .then(res => res.json())
                .then(data => {
                    const resultDom = document.getElementById('jump-result');
                    if (data.status === "empty") {
                        resultDom.innerText = "题库为空！";
                        resultDom.className = "text-danger mt-2";
                    } else {
                        document.getElementById('pid-input').value = data.pid;
                        resultDom.innerText = `随机推荐：${data.pid} ${data.name}`;
                        resultDom.className = "text-success mt-2";
                    }
                })
                .catch(err => {
                    document.getElementById('jump-result').innerText = "请求失败，请重试！";
                    console.log("随机跳题请求失败：", err);
                });
        }

        // 加载做题数据（模拟，实际从后端获取）
        function loadSubmissionData() {
            // 模拟后端返回的近7天做题数据
            const mockData = [1, 3, 2, 0, 4, 2, 5];
            submissionChart.data.datasets[0].data = mockData;
            submissionChart.update();
        }
    </script>
</body>
</html>
