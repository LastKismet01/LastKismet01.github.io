<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的洛谷风格题库</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入洛谷同款字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 顶部导航栏（洛谷同款深色风格） -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <h1>我的题库</h1>
      </div>
      <nav class="nav">
        <a href="#" class="nav-item active">首页</a>
        <a href="#" class="nav-item">题库</a>
        <a href="#" class="nav-item">比赛</a>
        <a href="#" class="nav-item">讨论</a>
        <a href="#" class="nav-item">个人中心</a>
      </nav>
    </div>
  </header>

  <!-- 主体内容区 -->
  <main class="main">
    <div class="main-inner">
      <!-- 左侧分类栏 -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <div class="sidebar-title">题库分类</div>
          <ul class="sidebar-list">
            <li><a href="#">入门难度</a></li>
            <li><a href="#">普及-</a></li>
            <li><a href="#">普及/提高-</a></li>
            <li><a href="#">提高/省选-</a></li>
            <li><a href="#">省选/NOI-</a></li>
          </ul>
        </div>
      </aside>

      <!-- 右侧题目列表 -->
      <section class="content">
        <div class="content-card">
          <div class="content-title">最新题目</div>
          <!-- 题目列表 -->
          <div class="problem-list">
            <div class="problem-item">
              <span class="problem-id">P1000</span>
              <a href="#" class="problem-name">A+B Problem</a>
              <span class="problem-diff diff-easy">入门</span>
              <span class="problem-ac">AC率 98.2%</span>
            </div>
            <div class="problem-item">
              <span class="problem-id">P1001</span>
              <a href="#" class="problem-name">Hello, World!</a>
              <span class="problem-diff diff-easy">入门</span>
              <span class="problem-ac">AC率 99.1%</span>
            </div>
            <div class="problem-item">
              <span class="problem-id">P1002</span>
              <a href="#" class="problem-name">数列求和</a>
              <span class="problem-diff diff-normal">普及-</span>
              <span class="problem-ac">AC率 85.7%</span>
            </div>
            <div class="problem-item">
              <span class="problem-id">P1003</span>
              <a href="#" class="problem-name">最长上升子序列</a>
              <span class="problem-diff diff-hard">普及/提高-</span>
              <span class="problem-ac">AC率 72.3%</span>
            </div>
            <div class="problem-item">
              <span class="problem-id">P1004</span>
              <a href="#" class="problem-name">最短路径</a>
              <span class="problem-diff diff-hard">提高/省选-</span>
              <span class="problem-ac">AC率 61.5%</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 底部 -->
  <footer class="footer">
    <div class="footer-inner">
      <p>© 2025 我的洛谷风格题库 | 新手学习项目</p>
    </div>
  </footer>
</body>
</html>
